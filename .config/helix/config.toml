theme = "ayu_dark"

[editor]
line-number = "relative"
scrolloff = 8
auto-format = true
auto-completion = true
auto-info = true
end-of-line-diagnostics = "hint"

[editor.inline-diagnostics]
cursor-line = "warning" 

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "block"

[editor.search]
smart-case = true

[editor.file-picker]
hidden = false

[editor.soft-wrap]
enable = true
max-wrap = 15

[keys.normal]
esc = ["collapse_selection", "keep_primary_selection"]
X = "extend_line_above"
B = ":echo %sh{git show --no-patch --format='%%h (%%an: %%ar): %%s' $(git blame -p %{buffer_name} -L%{cursor_line},+1 | head -1 | cut -d' ' -f1)}"

[keys.insert]
C-space = "completion"

[keys.normal.space]
m = "file_explorer_in_current_buffer_directory"
M = "file_explorer"
